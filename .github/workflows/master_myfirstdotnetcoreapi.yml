name: Build and Deploy .NET API (QA → PROD using azure/login)

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:

# 🔹 1. BUILD
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish -c Release -o ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: ./publish


# 🔹 2. DEPLOY TO QA (AUTO)
  deploy-qa:
    runs-on: ubuntu-latest
    needs: build
    environment: qa

    permissions:
      id-token: write   # 🔥 REQUIRED
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app

      - name: Deploy to QA Slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'myfirstdotnetcoreapi'
          slot-name: 'qa'   # 🔥 QA slot
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_QA }}
          package: .


# 🔹 3. DEPLOY TO PRODUCTION (MANUAL APPROVAL)
  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-qa
    environment: production   # 🔥 requires approval

    permissions:
      id-token: write   # 🔥 REQUIRED
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app

      - name: Deploy to Production
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'myfirstdotnetcoreapi'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PROD }}
          package: .   # 🔥 no slot-name for production