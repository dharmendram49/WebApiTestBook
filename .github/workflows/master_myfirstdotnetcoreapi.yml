name: Build and deploy ASP.Net Core app to Azure Web App - myfirstdotnetcoreapi

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:

# 🔹 BUILD JOB (same as yours, slightly improved)
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish -c Release -o ./publish   # ✅ simplified

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: ./publish


# 🔹 DEPLOY TO QA (AUTO)
  deploy-qa:
    runs-on: ubuntu-latest
    needs: build
    environment: qa   # ✅ GitHub Environment (no approval)

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app

      - name: Deploy to QA Slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'myfirstdotnetcoreapi'
          slot-name: 'qa'   # 🔥 your QA slot
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_QA }}
          package: .


# 🔹 DEPLOY TO PRODUCTION (MANUAL APPROVAL)
  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-qa
    environment: production   # 🔥 requires approval

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app

      - name: Deploy to Production
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'myfirstdotnetcoreapi'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PROD }}
          package: .